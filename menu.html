<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Menu — Projeto Équino</title>

    <link rel="stylesheet" href="estilo/style.css">

</head>

<body>

    <!-- Anomalia rara — aparece ocasionalmente -->
    <div id="anomalia"></div>

    <div class="menu">

        <center><h1>PROJETO ÉQUINO</h1></center>

        <p>ARQUIVO N-27</p>

        <div class="progresso">
            <p id="porcentagem">MEMÓRIAS RECUPERADAS: 0%</p>
        <div class="menu">

            <!-- Compact Header (mobile-first) -->
            <header id="menu-header" style="width:100%; display:flex; justify-content:space-between; align-items:center; gap:12px;">
                <div style="display:flex; flex-direction:column;">
                    <div id="header-title" style="font-size:1rem; color:var(--vermelho-brilhante); letter-spacing:2px;">PROJETO ÉQUINO</div>
                    <div id="header-sub" style="font-size:0.9rem; color:#ccc;">N-27 • 0%</div>
                </div>
                <div id="header-bm0" style="font-size:0.8rem; color:var(--vermelho-escuro); cursor:pointer;" onclick="window.open('paginas/terminal_bm0.html','_blank')">B-M0</div>
            </header>

            <!-- Tabs -->
            <nav id="menu-tabs" style="display:flex; gap:8px; margin-top:12px;">
                <button id="tab-fitas" class="tab-btn">FITAS</button>
                <button id="tab-investigacao" class="tab-btn">INVESTIGAÇÃO</button>
                <button id="tab-terminal" class="tab-btn">TERMINAL</button>
            </nav>

            <!-- Panels -->
            <section id="panel-fitas" class="panel active" style="margin-top:12px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-weight:700;">N-27</div>
                    <div id="porcentagem-condensed" style="color:#ccc; font-size:0.95rem;">0%</div>
                </div>
                <div class="fitas" id="fitas" style="margin-top:12px;"></div>
            </section>

            <section id="panel-investigacao" class="panel" style="display:none; margin-top:12px;">
                <!-- Investigation index: opens sub-panels -->
                <div style="margin-top:12px; display:flex; flex-direction:column; gap:6px;">

                    <div class="accordion-item">
                        <button class="accordion-btn" data-target="perfil-recuperado"><span class="accordion-icon">▶</span> Perfil Recuperado</button>
                        <div id="perfil-recuperado" class="accordion-content" aria-hidden="true">
                            <p class="perfil-titulo">PERFIL RECUPERADO</p>
                            <p class="perfil-linha">NOME: <span id="perfil-nome">DESCONHECIDO</span></p>
                            <p class="perfil-linha">RECONSTRUÇÃO: <span id="perfil-reconstrucao">0%</span></p>
                            <div id="perfil-afinidades" style="margin-top:8px;"></div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <button class="accordion-btn" data-target="evidencias-panel"><span class="accordion-icon">▶</span> Evidências <span id="evidencias-counter-inline" class="accordion-counter"></span></button>
                        <div id="evidencias-panel" class="accordion-content">
                            <p class="perfil-titulo">EVIDÊNCIAS <span id="evidencias-counter" style="color:#9ad8ff; font-weight:700; font-size:0.9rem; margin-left:8px;"></span></p>
                            <div id="evidencias-lista" style="margin-top:8px;"></div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <button class="accordion-btn" data-target="fragmentos-panel"><span class="accordion-icon">▶</span> Fragmentos <span id="fragmentos-counter-inline" class="accordion-counter"></span></button>
                        <div id="fragmentos-panel" class="accordion-content">
                            <p class="perfil-titulo">FRAGMENTOS <span id="fragmentos-counter" style="color:#9ad8ff; font-weight:700; font-size:0.9rem; margin-left:8px;"></span></p>
                            <div id="fragmentos-list" style="margin-top:8px;"></div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <button class="accordion-btn" data-target="conquistas-panel"><span class="accordion-icon">▶</span> Conquistas</button>
                        <div id="conquistas-panel" class="accordion-content">
                            <div class="conquistas-header">
                                <p class="perfil-titulo">CONQUISTAS</p>
                                <div id="conquistas-counter" style="color:#9ad8ff; font-weight:700; font-size:0.9rem;"></div>
                            </div>
                            <div id="conquistas-list" style="margin-top:8px;"></div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <button class="accordion-btn" data-target="arquivos-secundarios"><span class="accordion-icon">▶</span> Arquivos Secundários</button>
                        <div id="arquivos-secundarios" class="accordion-content">
                            <p class="perfil-titulo">ARQUIVOS SECUNDÁRIOS</p>
                            <div id="arquivos-lista" style="margin-top:8px;"></div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <button class="accordion-btn" data-target="timeline-panel"><span class="accordion-icon">▶</span> Linha Temporal</button>
                        <div id="timeline-panel" class="accordion-content">
                            <p class="perfil-titulo">LINHA TEMPORAL</p>
                            <div id="timeline-list" style="margin-top:8px; font-size:0.9rem; color:#ccc;"></div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <button class="accordion-btn" data-target="open-questions"><span class="accordion-icon">▶</span> Perguntas em Aberto</button>
                        <div id="open-questions" class="accordion-content">
                            <p class="perfil-titulo">PERGUNTAS EM ABERTO</p>
                            <div id="open-questions-list" style="margin-top:8px; color:#ddd; font-size:0.9rem;"></div>
                        </div>
                    </div>

                </div>
            </section>

            <section id="panel-terminal" class="panel" style="display:none; margin-top:12px;">
                <div style="font-weight:700; margin-bottom:8px;">TERMINAL B‑M0</div>
                <div id="terminal-window" style="background:#020202; padding:10px; color:#7efc8a; font-size:0.95rem; min-height:300px; max-height:60vh; overflow-y:auto; border-radius:4px;">
                    <!-- histórico aparecerá aqui -->
                </div>
                <div style="display:flex; gap:8px; align-items:center; margin-top:8px;">
                    <input id="terminal-input" type="text" placeholder="Comando ou senha (ex: AJUDA)" style="flex:1; padding:10px; border-radius:6px; border:1px solid #222; background:#070707; color:#ddd;">
                    <button id="terminal-enviar" style="padding:10px 14px;">ENVIAR</button>
                </div>
            </section>

        </div>
    <!-- B-M0 contextual -->
    <p class="bm0" id="bm0" style="cursor:pointer;" onclick="window.open('paginas/terminal_bm0.html','_blank')">B-M0 ONLINE</p>

    <script src="funcao/estado.js"></script>
    <script src="funcao/menu.js"></script>

</body>

</html>
