<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Memória 003</title>

</head>

<body>

    <div class="fita-container">

        <img id="imagemCena">

        <div id="texto"></div>

        <div id="enigma" style="display:none;" class="enigma">

            <p>Identifique a palavra que se repete em todas as fitas:</p>

            <input type="text" id="resposta" autocomplete="off" placeholder="Palavra secreta">

            <div class="fita-actions">
                <button id="enviar-btn" onclick="verificarResposta()">ENVIAR</button>
            </div>

            <div id="fita-feedback" class="fita-feedback"></div>

        </div>

        <button id="continuar" onclick="proximaCena()">
            CONTINUAR >
        </button>

    </div>

    <script src="../funcao/estado.js"></script>
    <script src="../funcao/fitas_ui.js"></script>
    <script src="../funcao/fita3.js"></script>
